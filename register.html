<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規会員登録 | ベーカリー・ソレイユ</title>
    <!-- Supabaseと通信するための公式スクリプト -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #4A3B32; margin: 0; background-color: #FAF6EE; }
        .container { max-width: 500px; margin: 50px auto; padding: 30px; background: #FFF; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #D28B47; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #E6D5C3; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border-color: #D28B47; background-color: #FFFDF9; }
        .btn-submit { width: 100%; background-color: #D28B47; color: white; border: none; padding: 14px; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background-color 0.3s; }
        .btn-submit:hover { background-color: #B57233; }
        .btn-back { display: block; text-align: center; margin-top: 20px; color: #6E5B4F; text-decoration: none; font-size: 14px; }
        .message { margin-top: 15px; padding: 10px; border-radius: 4px; text-align: center; display: none; }
        .success { background-color: #E8F5E9; color: #2E7D32; }
        .error { background-color: #FFEBEE; color: #C62828; }
    </style>
</head>
<body>

    <div class="container">
        <h2>新規会員登録</h2>
        
        <form id="register-form">
            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" required placeholder="example@soleil.com">
            </div>

            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" required placeholder="6文字以上のパスワード" minlength="6">
            </div>

            <button type="submit" class="btn-submit">登録する</button>
        </form>

        <div id="msg-box" class="message"></div>

        <a href="index.html" class="btn-back">← トップページへ戻る</a>
    </div>

    <script>
        // ★いただいたURLとAPIキーを反映させました★
        const SUPABASE_URL = "https://supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_UybqxmICCDiJXOpy2YN5hg_KkWNYwNL"; 

        // Supabaseクライアントの初期化
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // フォーム送信時の処理
        document.getElementById('register-form').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg-box');
            
            msgBox.style.display = "none";

            // Supabase Authenticationの会員登録機能を発動
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                msgBox.className = "message error";
                msgBox.innerText = "登録エラー: " + error.message;
                msgBox.style.display = "block";
            } else {
                msgBox.className = "message success";
                msgBox.innerText = "会員登録が完了しました！入力したメールアドレスの受信トレイを確認してください。";
                msgBox.style.display = "block";
                
                // 入力欄のクリア
                document.getElementById('email').value = "";
                document.getElementById('password').value = "";
            }
        });
    </script>

</body>
</html>
